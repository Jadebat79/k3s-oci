---
- name: Add ingress-nginx helm repo
  ansible.builtin.command: helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: repo_add
  changed_when: "'has been added' in repo_add.stdout"
  failed_when: repo_add.rc != 0 and 'already exists' not in repo_add.stderr

- name: Update helm repos
  ansible.builtin.command: helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

# k3s ships ServiceLB (klipper), so a LoadBalancer service binds host :80/:443
# on the nodes -- no cloud load balancer needed.
- name: Install / upgrade ingress-nginx
  ansible.builtin.command: >
    helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx
    --namespace ingress-nginx --create-namespace
    --set controller.service.type=LoadBalancer
    --set controller.service.externalTrafficPolicy=Local
    --set controller.publishService.enabled=true
    --set controller.watchIngressWithoutClass=true
    --wait --timeout 5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: ing_install
  changed_when: "'has been upgraded' in ing_install.stdout or 'has been installed' in ing_install.stdout"
