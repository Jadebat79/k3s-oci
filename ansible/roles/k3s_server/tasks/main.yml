---
- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_bin

- name: Install k3s server
  ansible.builtin.shell: |
    curl -sfL {{ k3s_channel_url }} | \
      INSTALL_K3S_VERSION={{ k3s_version }} \
      sh -s - server \
        --node-ip={{ node_private_ip }} \
        --advertise-address={{ node_private_ip }} \
        --tls-san={{ node_private_ip }} \
        --tls-san={{ ansible_host }} \
        --write-kubeconfig-mode=644 \
        --disable=traefik
  args:
    creates: /usr/local/bin/k3s

- name: Wait for k3s API to be ready
  ansible.builtin.command: k3s kubectl get --raw=/readyz
  register: readyz
  until: readyz.rc == 0
  retries: 30
  delay: 5
  changed_when: false

- name: Read node-token from server
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: node_token_b64

- name: Set node token fact (used by agents)
  ansible.builtin.set_fact:
    k3s_node_token: "{{ node_token_b64.content | b64decode | trim }}"

- name: Ensure kube directory exists for ubuntu user
  ansible.builtin.file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0700"

- name: Copy kubeconfig for the ubuntu user
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /home/ubuntu/.kube/config
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: "0600"
